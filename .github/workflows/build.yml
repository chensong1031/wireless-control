name: Build APK
on:
  push:
    branches:
    - main
    - master
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v2
    - run: chmod +x device-module/gradlew
    - name: Build Debug APK
      run: cd device-module && ./gradlew assembleDebug --stacktrace
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: device-module/app/build/outputs/apk/debug/*.apk
